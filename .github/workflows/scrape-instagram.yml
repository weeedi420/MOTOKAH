name: Scrape Instagram Dealers

"on":
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Scrape Instagram accounts
        env:
          INSTAGRAM_SESSION_ID: ${{ secrets.INSTAGRAM_SESSION_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/scrape_instagram.py

      - name: Commit and push
        run: |
          git config user.name "Motokah Scraper Bot"
          git config user.email "bot@motokah.com"
          git add src/data/showrooms/
          git diff --cached --quiet || (git commit -m "chore: refresh Instagram dealer listings" && git push)
