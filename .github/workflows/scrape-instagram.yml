name: Scrape Instagram Dealers

on:
  schedule:
    # Runs every Sunday at 2am UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests supabase

      - name: Scrape Instagram accounts
        env:
          INSTAGRAM_SESSION_ID: ${{ secrets.INSTAGRAM_SESSION_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/scrape_instagram.py

      - name: Commit and push changes
        run: |
          git config user.name "Motokah Scraper Bot"
          git config user.email "bot@motokah.com"
          git add src/data/showrooms/
          git diff --cached --exit-code || (git commit -m "chore: update Instagram dealer listings" && git push origin main)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
