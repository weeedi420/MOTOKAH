<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80" fill="currentColor">
  <!-- Hull body (bow points RIGHT) -->
  <path d="M6 52 L10 38 L70 38 Q84 38 93 45 L97 52 Z" fill="currentColor"/>
  <!-- Hull interior highlight -->
  <path d="M14 48 L16 42 L70 42 Q80 42 87 47 L90 50 Z" fill="white" opacity="0.2"/>
  <!-- Cabin roof -->
  <path d="M20 22 L66 22 L66 38 L20 38 Z" fill="currentColor" opacity="0.7"/>
  <rect x="20" y="22" width="46" height="16" rx="2" fill="currentColor" opacity="0.85"/>
  <!-- Windshield (angled front of cabin) -->
  <path d="M66 22 L74 38 L66 38 Z" fill="currentColor" opacity="0.6"/>
  <!-- Cabin window -->
  <rect x="28" y="26" width="20" height="10" rx="2" fill="white" opacity="0.5"/>
  <rect x="28" y="26" width="20" height="10" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Rear mast/pole -->
  <rect x="13" y="12" width="3.5" height="26" rx="1.5" fill="currentColor"/>
  <!-- Mast crossbar -->
  <rect x="7" y="12" width="16" height="3.5" rx="1.5" fill="currentColor"/>
  <!-- Water wave 1 -->
  <path d="M2 62 Q14 57 26 62 Q38 67 50 62 Q62 57 74 62 Q84 65 98 62" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Water wave 2 -->
  <path d="M2 71 Q16 66 30 71 Q44 76 58 71 Q72 66 88 71" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
</svg>
