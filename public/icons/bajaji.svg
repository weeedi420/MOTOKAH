<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 90" fill="currentColor">
  <!-- Body / cabin shell -->
  <path d="M10 28 C10 12 26 10 26 10 L74 10 C82 10 84 18 84 24 L84 64 L10 64 Z" fill="currentColor" opacity="0.15"/>
  <!-- Roof outline -->
  <path d="M26 10 L74 10 C83 10 85 19 85 25 L85 30 L9 30 L9 25 C9 15 18 10 26 10 Z" fill="currentColor"/>
  <!-- Body outline -->
  <rect x="9" y="29" width="76" height="36" rx="2" fill="currentColor" opacity="0.08"/>
  <path d="M9 30 L9 64 L85 64 L85 30" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
  <!-- Windshield divider -->
  <rect x="9" y="30" width="22" height="34" rx="0" fill="currentColor" opacity="0.2"/>
  <line x1="31" y1="10" x2="31" y2="64" stroke="currentColor" stroke-width="4"/>
  <!-- Passenger window -->
  <rect x="36" y="16" width="34" height="26" rx="3" fill="white" opacity="0.4"/>
  <rect x="36" y="16" width="34" height="26" rx="3" fill="none" stroke="currentColor" stroke-width="3.5"/>
  <!-- Window divider -->
  <line x1="53" y1="16" x2="53" y2="42" stroke="currentColor" stroke-width="2.5"/>
  <!-- Handlebar (left side) -->
  <path d="M9 36 L2 36" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <path d="M2 33 L2 42" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <!-- Front wheel -->
  <circle cx="22" cy="76" r="12" fill="currentColor"/>
  <circle cx="22" cy="76" r="6" fill="white"/>
  <circle cx="22" cy="76" r="2.5" fill="currentColor"/>
  <!-- Rear wheel -->
  <circle cx="72" cy="76" r="12" fill="currentColor"/>
  <circle cx="72" cy="76" r="6" fill="white"/>
  <circle cx="72" cy="76" r="2.5" fill="currentColor"/>
  <!-- Axle bar -->
  <rect x="34" y="74" width="26" height="4" rx="2" fill="currentColor"/>
</svg>
